{% extends 'users/index.html' %}
{% block content %}
<div class="container">

    <form method="POST" class="register-form">
        {% csrf_token %}

        <h2>Create Account</h2>

        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>

        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" minlength="6" required>
        </div>

        <div class="input-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password" minlength="6" required>
        </div>

        <div class="input-group checkbox">
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to the terms & conditions</label>
        </div>

        <button type="submit">Register</button>

        <p class="login-link">
            Already have an account?
            <a href="{% url 'login-form' %}">Login</a>
        </p>

    </form> 
</div>
{% endblock %}
